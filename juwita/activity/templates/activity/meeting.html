{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Session - Juwita</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% tailwind_css %}
</head>
<body id="body" class="min-h-screen font-light transition-colors duration-300">
    <div class="max-w-2xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <a href="/" class="text-xl tracking-tight font-medium hover:opacity-70 transition-opacity">juwita</a>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="w-9 h-9 rounded-full border flex items-center justify-center transition-all theme-btn">
                    <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5" stroke-width="2"/>
                        <path stroke-width="2" stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg id="moonIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="authButton" class="text-sm px-3 py-1.5 rounded-lg auth-btn transition-colors">Login</button>
            </div>
        </div>

        <!-- Loading state -->
        <div id="loading" class="text-center py-12 opacity-50">Loading...</div>

        <!-- Meeting content -->
        <div id="content" class="hidden">
            <!-- Back link -->
            <a href="/" class="inline-flex items-center gap-2 text-sm opacity-60 hover:opacity-100 mb-6 transition-opacity">
                <span>&larr;</span> Back to sessions
            </a>

            <!-- Time info -->
            <div class="mb-6">
                <h1 class="text-2xl font-medium mb-2">Session Details</h1>
                <p id="meeting-time" class="opacity-60"></p>
                <p id="meeting-duration" class="text-lg font-medium mt-1"></p>
            </div>

            <!-- Tags -->
            <div class="mb-6">
                <p class="text-sm opacity-60 mb-2">Tags</p>
                <div id="tags" class="flex flex-wrap gap-2 mb-2"></div>
                <div id="add-tag-container" class="mt-3 gap-2 items-center flex-wrap" style="display: none;">
                    <select id="tag-select" class="px-3 py-2 rounded-lg tag-input text-sm">
                        <option value="">Add tag...</option>
                    </select>
                    <button onclick="openCreateTag()" class="px-3 py-2 rounded-lg text-sm upload-btn">+ New Tag</button>
                </div>
                <!-- Create tag modal -->
                <div id="create-tag-modal" class="hidden fixed inset-0 z-50">
                    <div class="absolute inset-0 bg-black/50" onclick="closeCreateTag()"></div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-6 rounded-2xl tag-modal">
                        <h3 class="text-lg font-medium mb-4">Create New Tag</h3>
                        <div class="mb-3">
                            <label class="block text-sm opacity-60 mb-1">Tag Name</label>
                            <input type="text" id="new-tag-name" class="w-full px-3 py-2 rounded-lg tag-input">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm opacity-60 mb-1">Color</label>
                            <input type="color" id="new-tag-color" value="#6b7280" class="w-full h-10 rounded-lg cursor-pointer">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="closeCreateTag()" class="flex-1 py-2 rounded-lg upload-btn">Cancel</button>
                            <button onclick="createTag()" class="flex-1 py-2 rounded-lg bg-green-500 text-white">Create</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Time editing (admin only) -->
            <div id="time-edit" class="hidden mb-6">
                <p class="text-sm opacity-60 mb-2">Edit Times</p>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs opacity-40 mb-1">Start</label>
                        <input type="datetime-local" id="edit-start" class="w-full px-3 py-2 rounded-lg tag-input">
                    </div>
                    <div>
                        <label class="block text-xs opacity-40 mb-1">End</label>
                        <input type="datetime-local" id="edit-end" class="w-full px-3 py-2 rounded-lg tag-input">
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="mb-6">
                <p class="text-sm opacity-60 mb-2">Notes</p>
                <textarea id="notes" rows="4" class="w-full px-4 py-3 rounded-xl tag-input resize-none" placeholder="No notes yet"></textarea>
            </div>

            <!-- Photos -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm opacity-60">Photos</p>
                    <label id="upload-btn" class="hidden inline-flex items-center gap-2 px-3 py-1.5 rounded-lg cursor-pointer upload-btn text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        <span>Add Photos</span>
                        <input type="file" id="photo-input" accept="image/*" multiple class="hidden" onchange="uploadPhotos()">
                    </label>
                </div>
                <div id="photos" class="grid grid-cols-2 md:grid-cols-3 gap-2"></div>
                <div id="upload-progress" class="hidden mt-3 text-sm opacity-60 text-center">Uploading...</div>
            </div>

            <!-- Save button (admin only) -->
            <button id="save-btn" onclick="saveChanges()" class="hidden w-full py-3 rounded-xl bg-green-500 text-white font-medium hover:bg-green-600 transition-colors">Save Changes</button>
        </div>
    </div>

    <!-- Photo lightbox -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/95 flex items-center justify-center" onclick="closeLightbox(event)">
        <button onclick="closeLightbox(event, true)" class="absolute top-4 right-4 w-10 h-10 text-white/70 hover:text-white text-2xl transition-colors flex items-center justify-center">&times;</button>
        <button onclick="prevPhoto(event)" class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 text-white/50 hover:text-white text-3xl transition-colors flex items-center justify-center rounded-full hover:bg-white/10">&#8249;</button>
        <button onclick="nextPhoto(event)" class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 text-white/50 hover:text-white text-3xl transition-colors flex items-center justify-center rounded-full hover:bg-white/10">&#8250;</button>
        <img id="lightbox-img" class="max-w-[70vw] max-h-[70vh] object-contain rounded-lg shadow-2xl">
        <div id="lightbox-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/60 text-sm"></div>
    </div>

    <style>
        /* Light mode */
        .light { background: #f5f5f5; color: #171717; }
        .light .theme-btn { border-color: #e5e5e5; color: #737373; }
        .light .theme-btn:hover { border-color: #a3a3a3; color: #171717; }
        .light .auth-btn { background: #e5e5e5; color: #171717; }
        .light .auth-btn:hover { background: #d4d4d4; }
        .light .tag-input { background: #e5e5e5; border: 1px solid #d4d4d4; color: #171717; }
        .light .upload-btn { background: #e5e5e5; }
        .light .upload-btn:hover { background: #d4d4d4; }
        .light .photo-card { background: #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .light .tag-modal { background: #f5f5f5; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        /* Dark mode */
        .dark { background: #0a0a0a; color: #f5f5f5; }
        .dark .theme-btn { border-color: #262626; color: #737373; }
        .dark .theme-btn:hover { border-color: #404040; color: #f5f5f5; }
        .dark .auth-btn { background: #262626; color: #f5f5f5; }
        .dark .auth-btn:hover { background: #404040; }
        .dark .tag-input { background: #262626; border: 1px solid #404040; color: #f5f5f5; }
        .dark .upload-btn { background: #262626; }
        .dark .upload-btn:hover { background: #404040; }
        .dark .photo-card { background: #262626; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .dark .tag-modal { background: #171717; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>

    <script>
        const meetingId = {{ meeting_id }};
        let isAdmin = false;
        let allTags = [];

        // Theme
        let isDark = localStorage.getItem('theme') !== 'light';
        function applyTheme() {
            const body = document.getElementById('body');
            body.classList.remove('dark', 'light');
            body.classList.add(isDark ? 'dark' : 'light');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }
        applyTheme();

        document.getElementById('themeToggle').addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        });

        // Auth
        function checkAuth() {
            fetch('/api/auth/status/')
                .then(r => r.json())
                .then(data => {
                    isAdmin = data.authenticated;
                    document.getElementById('authButton').textContent = isAdmin ? 'Logout' : 'Login';
                    updateAdminUI();
                });
        }

        function updateAdminUI() {
            document.getElementById('time-edit').classList.toggle('hidden', !isAdmin);
            document.getElementById('save-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('upload-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('add-tag-container').style.display = isAdmin ? 'flex' : 'none';
            document.getElementById('notes').readOnly = !isAdmin;
        }

        document.getElementById('authButton').addEventListener('click', () => {
            if (isAdmin) {
                fetch('/api/auth/logout/').then(() => {
                    isAdmin = false;
                    document.getElementById('authButton').textContent = 'Login';
                    updateAdminUI();
                });
            } else {
                window.location.href = '/login/';
            }
        });

        // Utilities
        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(isoString) {
            const d = new Date(isoString);
            return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }

        function formatDuration(minutes) {
            if (minutes < 1) return 'Less than 1 minute';
            if (minutes < 60) return Math.round(minutes) + ' minutes';
            const h = Math.floor(minutes / 60);
            const m = Math.round(minutes % 60);
            return h + 'h ' + m + 'm';
        }

        // Load meeting
        function loadMeeting() {
            fetch('/api/meetings/' + meetingId + '/')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');

                    document.getElementById('meeting-time').textContent =
                        formatDate(data.start) + ' • ' + formatTime(data.start) + ' – ' + (data.end ? formatTime(data.end) : 'ongoing');
                    document.getElementById('meeting-duration').textContent = formatDuration(data.duration_minutes);

                    document.getElementById('edit-start').value = data.start.slice(0, 16);
                    document.getElementById('edit-end').value = data.end ? data.end.slice(0, 16) : '';
                    document.getElementById('notes').value = data.notes || '';

                    renderTags(data.tags || []);
                    renderPhotos(data.photos || []);
                });
        }

        // Tags
        function loadAllTags() {
            fetch('/api/tags/')
                .then(r => r.json())
                .then(data => {
                    allTags = data.tags;
                    updateTagSelect();
                });
        }

        function updateTagSelect() {
            const select = document.getElementById('tag-select');
            select.innerHTML = '<option value="">Add tag...</option>' +
                allTags.map(t => `<option value="${t.id}" style="background:${t.color}">${t.name}</option>`).join('');
        }

        function renderTags(tags) {
            const container = document.getElementById('tags');
            if (tags.length === 0) {
                container.innerHTML = '<span class="text-sm opacity-40">No tags</span>';
            } else {
                container.innerHTML = tags.map(t => `
                    <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm text-white" style="background:${t.color}">
                        ${t.name}
                        ${isAdmin ? `<button onclick="removeTag(${t.id})" class="ml-1 hover:opacity-70">&times;</button>` : ''}
                    </span>
                `).join('');
            }
        }

        document.getElementById('tag-select').addEventListener('change', (e) => {
            if (e.target.value) {
                fetch('/api/meetings/' + meetingId + '/tags/' + e.target.value + '/', { method: 'POST' })
                    .then(() => {
                        e.target.value = '';
                        loadMeeting();
                    });
            }
        });

        function removeTag(tagId) {
            fetch('/api/meetings/' + meetingId + '/tags/' + tagId + '/', { method: 'DELETE' })
                .then(() => loadMeeting());
        }

        // Photos
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        function renderPhotos(photos) {
            currentPhotos = photos;
            const container = document.getElementById('photos');
            if (photos.length === 0) {
                container.innerHTML = '<p class="col-span-3 text-sm opacity-40 py-8 text-center">No photos yet</p>';
            } else {
                container.innerHTML = photos.map((p, i) => `
                    <div class="photo-card rounded-xl overflow-hidden relative group aspect-square">
                        <img src="${p.url}" class="w-full h-full object-cover cursor-pointer transition-transform duration-300 group-hover:scale-105" onclick="openLightbox(${i})">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors pointer-events-none"></div>
                        ${isAdmin ? `<button onclick="event.stopPropagation(); deletePhoto(${p.id})" class="absolute top-2 right-2 w-7 h-7 bg-red-500/90 hover:bg-red-600 text-white rounded-full text-sm opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center backdrop-blur-sm">&times;</button>` : ''}
                    </div>
                `).join('');
            }
        }

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function updateLightboxImage() {
            if (currentPhotos.length === 0) return;
            document.getElementById('lightbox-img').src = currentPhotos[currentPhotoIndex].url;
            document.getElementById('lightbox-counter').textContent = `${currentPhotoIndex + 1} / ${currentPhotos.length}`;
        }

        function closeLightbox(event, force = false) {
            if (force || event.target.id === 'lightbox') {
                document.getElementById('lightbox').classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        function prevPhoto(event) {
            event.stopPropagation();
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            updateLightboxImage();
        }

        function nextPhoto(event) {
            event.stopPropagation();
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            updateLightboxImage();
        }

        // Keyboard navigation for lightbox
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('hidden')) return;
            if (e.key === 'Escape') closeLightbox(e, true);
            if (e.key === 'ArrowLeft') prevPhoto(e);
            if (e.key === 'ArrowRight') nextPhoto(e);
        });

        function uploadPhotos() {
            const input = document.getElementById('photo-input');
            const files = input.files;
            if (!files.length) return;

            const progress = document.getElementById('upload-progress');
            progress.classList.remove('hidden');
            progress.textContent = `Uploading ${files.length} photo${files.length > 1 ? 's' : ''}...`;

            const uploads = Array.from(files).map(file => {
                const formData = new FormData();
                formData.append('photo', file);
                return fetch('/api/meetings/' + meetingId + '/photos/', { method: 'POST', body: formData });
            });

            Promise.all(uploads).then(() => {
                input.value = '';
                progress.classList.add('hidden');
                loadMeeting();
            }).catch(() => {
                progress.textContent = 'Upload failed';
                setTimeout(() => progress.classList.add('hidden'), 2000);
            });
        }

        // Tag creation modal
        function openCreateTag() {
            document.getElementById('create-tag-modal').classList.remove('hidden');
            document.getElementById('new-tag-name').value = '';
            document.getElementById('new-tag-color').value = '#6b7280';
        }

        function closeCreateTag() {
            document.getElementById('create-tag-modal').classList.add('hidden');
        }

        function createTag() {
            const name = document.getElementById('new-tag-name').value.trim();
            const color = document.getElementById('new-tag-color').value;
            if (!name) return;

            fetch('/api/tags/manage/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    closeCreateTag();
                    loadAllTags();
                }
            });
        }

        function deletePhoto(photoId) {
            fetch('/api/meetings/' + meetingId + '/photos/' + photoId + '/', { method: 'DELETE' })
                .then(() => loadMeeting());
        }

        // Save
        function saveChanges() {
            const data = {
                start: document.getElementById('edit-start').value,
                end: document.getElementById('edit-end').value,
                notes: document.getElementById('notes').value
            };
            fetch('/api/meetings/' + meetingId + '/', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => window.location.href = '/');
        }

        // Init
        checkAuth();
        loadMeeting();
        loadAllTags();
    </script>
</body>
</html>
