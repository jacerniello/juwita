{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Juwita</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-neutral-900 text-white flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="bg-neutral-800 rounded-2xl p-8">
            <h1 class="text-2xl font-medium mb-2">juwita</h1>
            <p class="text-neutral-400 mb-6">Admin Login</p>

            <form method="post" action="/api/auth/login/">
                <div class="mb-4">
                    <label class="block text-sm text-neutral-400 mb-1">Username</label>
                    <input type="text" name="username" id="username" class="w-full px-4 py-3 rounded-lg bg-neutral-700 border border-neutral-600 text-white focus:outline-none focus:border-green-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-neutral-400 mb-1">Password</label>
                    <input type="password" name="password" id="password" class="w-full px-4 py-3 rounded-lg bg-neutral-700 border border-neutral-600 text-white focus:outline-none focus:border-green-500">
                </div>
                <p id="error" class="text-red-500 text-sm mb-4 hidden">Invalid credentials</p>
                <button type="submit" class="w-full py-3 rounded-lg bg-green-500 text-white font-medium hover:bg-green-600 transition-colors">Login</button>
            </form>

            <p class="text-center mt-6">
                <a href="/" class="text-neutral-400 hover:text-white transition-colors">Back to home</a>
            </p>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => {
                if (r.ok) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error').classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
