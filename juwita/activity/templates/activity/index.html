{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Juwita</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-neutral-100 text-neutral-900 font-light">
    <div class="max-w-lg mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl tracking-tight font-medium">juwita</h1>
            <button id="refreshButton" class="text-neutral-400 hover:text-neutral-600 transition-all text-xl">↻</button>
        </div>

        <!-- Big Status Box -->
        <div id="status-box" class="rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-red-500">
            <p id="status-text" class="text-4xl font-bold text-white mb-2">NOT IN SESSION</p>
            <p id="status-detail" class="text-white/80 text-lg"></p>
        </div>

        <!-- Session Log -->
        <div>
            <p class="text-sm font-medium text-neutral-500 uppercase tracking-wider mb-4">Session Log</p>
            <div id="sessions" class="space-y-2">
            </div>
        </div>

        <!-- Test Ping Button -->
        <div class="fixed bottom-6 right-6">
            <button id="pingButton" class="w-12 h-12 rounded-full bg-neutral-800 text-white text-xl hover:bg-neutral-700 transition-all shadow-lg">+</button>
        </div>
    </div>

    <script>
        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function formatDate(isoString) {
            const d = new Date(isoString);
            const today = new Date();
            if (d.toDateString() === today.toDateString()) return 'Today';
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function formatDuration(minutes) {
            if (minutes < 1) return '<1 min';
            if (minutes < 60) return Math.round(minutes) + ' min';
            const h = Math.floor(minutes / 60);
            const m = Math.round(minutes % 60);
            return h + 'h ' + m + 'm';
        }

        function loadMeetings() {
            fetch('/api/meetings/')
                .then(r => r.json())
                .then(data => {
                    const box = document.getElementById('status-box');
                    const text = document.getElementById('status-text');
                    const detail = document.getElementById('status-detail');

                    if (data.active_meeting) {
                        box.className = 'rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-green-500';
                        text.textContent = 'IN SESSION';
                        detail.textContent = formatDuration(data.active_meeting.duration_minutes);
                    } else {
                        box.className = 'rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-red-500';
                        text.textContent = 'NOT IN SESSION';
                        detail.textContent = 'Waiting for activity...';
                    }

                    const sessionsEl = document.getElementById('sessions');

                    // Build session log with intervals
                    let entries = [];

                    // Add completed meetings as "IN SESSION" periods
                    data.meetings.forEach(m => {
                        entries.push({
                            type: 'session',
                            start: new Date(m.start),
                            end: new Date(m.end),
                            duration: m.duration_minutes
                        });
                    });

                    // Sort by start time descending
                    entries.sort((a, b) => b.start - a.start);

                    if (entries.length === 0) {
                        sessionsEl.innerHTML = '<p class="text-neutral-400 text-sm py-4 text-center">No sessions recorded yet</p>';
                    } else {
                        sessionsEl.innerHTML = entries.slice(0, 15).map(e => {
                            return `<div class="bg-white rounded-xl p-4 border border-neutral-200 shadow-sm">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="inline-flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                                        <span class="font-medium text-green-700">IN SESSION</span>
                                    </span>
                                    <span class="text-sm font-medium text-neutral-600">${formatDuration(e.duration)}</span>
                                </div>
                                <div class="text-sm text-neutral-500">
                                    ${formatDate(e.start.toISOString())} &bull; ${formatTime(e.start.toISOString())} – ${formatTime(e.end.toISOString())}
                                </div>
                            </div>`;
                        }).join('');
                    }
                });
        }

        document.getElementById('pingButton').addEventListener('click', () => {
            fetch('/api/ping').then(() => loadMeetings());
        });
        document.getElementById('refreshButton').addEventListener('click', loadMeetings);

        loadMeetings();
        setInterval(loadMeetings, 3000);
    </script>
</body>
</html>
