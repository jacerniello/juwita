{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Juwita</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% tailwind_css %}
</head>
<body id="body" class="min-h-screen font-light transition-colors duration-300">
    <div class="max-w-lg mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl tracking-tight font-medium">juwita</h1>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="w-9 h-9 rounded-full border flex items-center justify-center transition-all theme-btn">
                    <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5" stroke-width="2"/>
                        <path stroke-width="2" stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg id="moonIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="refreshButton" class="opacity-50 hover:opacity-100 transition-all text-xl">↻</button>
                <button id="authButton" class="text-sm px-3 py-1.5 rounded-lg auth-btn transition-colors">Login</button>
            </div>
        </div>

        <!-- Big Status Box -->
        <div id="status-box" class="rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-neutral-500">
            <p id="status-text" class="text-4xl font-bold text-white mb-2">...</p>
            <p id="status-detail" class="text-white/80 text-lg">loading</p>
        </div>

        <!-- Session Log -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <p id="session-label" class="text-sm font-medium uppercase tracking-wider">Past Sessions</p>
                <div class="flex items-center gap-3">
                    <button id="tag-settings-btn" onclick="openTagModal()" class="hidden text-sm opacity-50 hover:opacity-100 transition-opacity">⚙ Tags</button>
                    <button onclick="toggleDateFilter()" class="text-sm opacity-50 hover:opacity-100 transition-opacity">Filter</button>
                </div>
            </div>
            <!-- Date Filter -->
            <div id="date-filter" class="hidden mb-4 p-3 rounded-xl filter-box">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs opacity-50 mb-1">From</label>
                        <input type="date" id="filter-from" class="w-full px-2 py-1.5 rounded-lg filter-input text-sm">
                    </div>
                    <div>
                        <label class="block text-xs opacity-50 mb-1">To</label>
                        <input type="date" id="filter-to" class="w-full px-2 py-1.5 rounded-lg filter-input text-sm">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="applyFilter()" class="flex-1 py-1.5 rounded-lg text-sm bg-green-500 text-white">Apply</button>
                    <button onclick="clearFilter()" class="flex-1 py-1.5 rounded-lg text-sm filter-btn">Clear</button>
                </div>
            </div>
            <div id="sessions" class="space-y-2"></div>
            <div id="load-more" class="hidden text-center py-4">
                <span class="text-sm opacity-50">Loading more...</span>
            </div>
            <div id="no-more" class="hidden text-center py-4">
                <span class="text-sm opacity-30">No more sessions</span>
            </div>
        </div>

    </div>

    <!-- Tag Context Menu -->
    <div id="tag-menu" class="fixed hidden z-50 py-2 rounded-xl shadow-lg context-menu" style="min-width: 150px;">
        <div id="tag-menu-items"></div>
        <div id="tag-menu-empty" class="px-4 py-2 text-sm opacity-50">No tags available</div>
    </div>

    <!-- Edit Time Modal -->
    <div id="edit-time-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeEditTimeModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-6 rounded-2xl modal-content">
            <button onclick="closeEditTimeModal()" class="absolute top-4 right-4 text-2xl opacity-50 hover:opacity-100">&times;</button>
            <h2 class="text-lg font-medium mb-4">Edit Session Time</h2>
            <input type="hidden" id="edit-time-meeting-id">
            <div class="space-y-3 mb-4">
                <div>
                    <label class="block text-sm opacity-60 mb-1">Start</label>
                    <input type="datetime-local" id="edit-time-start" class="w-full px-3 py-2 rounded-lg modal-input">
                </div>
                <div>
                    <label class="block text-sm opacity-60 mb-1">End</label>
                    <input type="datetime-local" id="edit-time-end" class="w-full px-3 py-2 rounded-lg modal-input">
                </div>
            </div>
            <button onclick="saveEditTime()" class="w-full py-2 rounded-lg bg-green-500 text-white font-medium hover:bg-green-600 transition-colors">Save</button>
        </div>
    </div>

    <!-- Tag Management Modal -->
    <div id="tag-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeTagModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-6 rounded-2xl modal-content">
            <button onclick="closeTagModal()" class="absolute top-4 right-4 text-2xl opacity-50 hover:opacity-100">&times;</button>
            <h2 class="text-xl font-medium mb-4">Manage Tags</h2>
            <div id="tag-list" class="space-y-2 mb-4 max-h-64 overflow-y-auto"></div>
            <div class="border-t border-gray-600 pt-4">
                <p class="text-sm opacity-60 mb-2">Create New Tag</p>
                <div class="flex gap-2">
                    <input type="text" id="new-tag-name" class="flex-1 px-3 py-2 rounded-lg modal-input" placeholder="Tag name">
                    <input type="color" id="new-tag-color" value="#22c55e" class="w-12 h-10 rounded-lg cursor-pointer">
                    <button onclick="createNewTag()" class="px-4 py-2 rounded-lg bg-green-500 text-white">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Session Detail Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
        <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg modal-content rounded-2xl p-6 overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl opacity-50 hover:opacity-100">&times;</button>
            <h2 class="text-xl font-medium mb-6">Session Details</h2>

            <input type="hidden" id="modal-meeting-id">

            <!-- Time inputs (admin only) -->
            <div id="modal-times" class="grid grid-cols-2 gap-4 mb-4 hidden">
                <div>
                    <label class="block text-sm opacity-60 mb-1">Start Time</label>
                    <input type="datetime-local" id="modal-start" class="w-full px-3 py-2 rounded-lg modal-input">
                </div>
                <div>
                    <label class="block text-sm opacity-60 mb-1">End Time</label>
                    <input type="datetime-local" id="modal-end" class="w-full px-3 py-2 rounded-lg modal-input">
                </div>
            </div>
            <!-- Time display (non-admin) -->
            <div id="modal-times-readonly" class="mb-4">
                <p class="text-sm opacity-60 mb-1">Time</p>
                <p id="modal-time-display" class="text-lg"></p>
            </div>

            <!-- Notes -->
            <div class="mb-4">
                <label class="block text-sm opacity-60 mb-1">Notes</label>
                <textarea id="modal-notes" rows="4" class="w-full px-3 py-2 rounded-lg modal-input resize-none" placeholder="No notes yet"></textarea>
            </div>

            <!-- Photos -->
            <div class="mb-4">
                <label class="block text-sm opacity-60 mb-2">Photos</label>
                <div id="modal-photos" class="grid grid-cols-3 gap-2 mb-2"></div>
                <label id="photo-upload-btn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer modal-upload-btn hidden">
                    <span>+ Add Photo</span>
                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="uploadPhoto()">
                </label>
            </div>

            <!-- Save button (admin only) -->
            <button id="modal-save-btn" onclick="saveSession()" class="w-full py-3 rounded-lg bg-green-500 text-white font-medium hover:bg-green-600 transition-colors hidden">Save Changes</button>
        </div>
    </div>

    <style>
        /* Light mode */
        .light { background: #f5f5f5; color: #171717; }
        .light .theme-btn { border-color: #e5e5e5; color: #737373; }
        .light .theme-btn:hover { border-color: #a3a3a3; color: #171717; }
        .light .session-card { background: #e5e5e5; border: 1px solid #d4d4d4; }
        .light .session-card:hover { background: #d4d4d4; }
        .light #session-label { color: #737373; }
        .light .delete-btn { color: #737373; }
        .light .delete-btn:hover { color: #dc2626; }
        .light .auth-btn { background: #e5e5e5; color: #171717; }
        .light .auth-btn:hover { background: #d4d4d4; }
        .light .modal-content { background: #f5f5f5; }
        .light .modal-input { background: white; border: 1px solid #e5e5e5; color: #171717; }
        .light .modal-upload-btn { background: #e5e5e5; }
        .light .modal-upload-btn:hover { background: #d4d4d4; }
        .light .filter-box { background: #e5e5e5; }
        .light .filter-input { background: white; border: 1px solid #d4d4d4; color: #171717; }
        .light .filter-btn { background: #d4d4d4; }
        .light .context-menu { background: #f5f5f5; border: 1px solid #d4d4d4; }
        .light .context-menu-item { color: #171717; }
        .light .context-menu-item:hover { background: #e5e5e5; }

        /* Dark mode */
        .dark { background: #0a0a0a; color: #f5f5f5; }
        .dark .theme-btn { border-color: #262626; color: #737373; }
        .dark .theme-btn:hover { border-color: #404040; color: #f5f5f5; }
        .dark .session-card { background: #262626; border: 1px solid #404040; }
        .dark .session-card:hover { background: #303030; }
        .dark #session-label { color: #737373; }
        .dark .session-text { color: #d4d4d4 !important; }
        .dark .session-time { color: #d4d4d4 !important; }
        .dark .delete-btn { color: #737373; }
        .dark .delete-btn:hover { color: #dc2626; }
        .dark .auth-btn { background: #262626; color: #f5f5f5; }
        .dark .auth-btn:hover { background: #404040; }
        .dark .modal-content { background: #171717; }
        .dark .modal-input { background: #262626; border: 1px solid #404040; color: #f5f5f5; }
        .dark .modal-upload-btn { background: #262626; }
        .dark .modal-upload-btn:hover { background: #303030; }
        .dark .filter-box { background: #262626; }
        .dark .filter-input { background: #171717; border: 1px solid #404040; color: #f5f5f5; }
        .dark .filter-btn { background: #404040; }
        .dark .context-menu { background: #1a1a1a; border: 1px solid #404040; }
        .dark .context-menu-item { color: #f5f5f5; }
        .dark .context-menu-item:hover { background: #333; }

        /* Refresh spin animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning {
            animation: spin 0.5s ease-in-out;
        }

        /* Ping pulse animation - full page wave */
        @keyframes page-wave {
            0% {
                transform: translateX(-100%) skewX(-15deg);
            }
            100% {
                transform: translateX(200%) skewX(-15deg);
            }
        }
        #body {
            position: relative;
            overflow-x: hidden;
        }
        .pulse::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 40%;
            height: 100vh;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(34, 197, 94, 0.15),
                rgba(34, 197, 94, 0.25),
                rgba(34, 197, 94, 0.15),
                transparent
            );
            animation: page-wave 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
    </style>

    <script>
        // Theme
        let isDark = localStorage.getItem('theme') !== 'light';
        function applyTheme() {
            const body = document.getElementById('body');
            body.classList.remove('dark', 'light');
            body.classList.add(isDark ? 'dark' : 'light');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }
        applyTheme();

        document.getElementById('themeToggle').addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        });

        // Auth
        let isAdmin = false;
        function checkAuth() {
            fetch('/api/auth/status/')
                .then(r => r.json())
                .then(data => {
                    const wasAdmin = isAdmin;
                    isAdmin = data.authenticated;
                    updateAuthUI();
                    // Re-render sessions if admin status changed
                    if (wasAdmin !== isAdmin && allLoadedMeetings.length > 0) {
                        renderSessions();
                    }
                });
        }

        function updateAuthUI() {
            const btn = document.getElementById('authButton');
            btn.textContent = isAdmin ? 'Logout' : 'Login';
            document.getElementById('tag-settings-btn').classList.toggle('hidden', !isAdmin);
        }

        function doLogout() {
            fetch('/api/auth/logout/').then(() => {
                isAdmin = false;
                updateAuthUI();
                lastMeetingsHash = null;
                loadMeetings();
            });
        }

        document.getElementById('authButton').addEventListener('click', () => {
            if (isAdmin) doLogout();
            else window.location.href = '/login/';
        });

        checkAuth();

        // Utilities
        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function formatDate(isoString) {
            const d = new Date(isoString);
            const today = new Date();
            if (d.toDateString() === today.toDateString()) return 'Today';
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function formatDuration(minutes) {
            if (minutes < 1) return '<1 min';
            if (minutes < 60) return Math.round(minutes) + ' min';
            const h = Math.floor(minutes / 60);
            const m = Math.round(minutes % 60);
            return h + 'h ' + m + 'm';
        }

        function formatCountUp(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        // Active session tracking
        let activeSessionStart = null;
        let countUpInterval = null;
        let lastPing = null;
        let lastMeetingsHash = null;
        let wasActiveSession = false;

        // Pagination state
        let currentOffset = 0;
        const PAGE_SIZE = 10;
        let hasMore = true;
        let isLoading = false;
        let allLoadedMeetings = [];

        // Filter state
        let filterFrom = null;
        let filterTo = null;

        function updateCountUp() {
            if (activeSessionStart) {
                const elapsed = (Date.now() - activeSessionStart) / 1000;
                document.getElementById('status-detail').textContent = 'Started: ' + formatCountUp(elapsed);
            }
        }

        function triggerPulse() {
            const body = document.getElementById('body');
            body.classList.remove('pulse');
            void body.offsetWidth; // Force reflow to restart animation
            body.classList.add('pulse');
            setTimeout(() => body.classList.remove('pulse'), 700);
        }

        // Filter functions
        function toggleDateFilter() {
            document.getElementById('date-filter').classList.toggle('hidden');
        }

        function applyFilter() {
            filterFrom = document.getElementById('filter-from').value || null;
            filterTo = document.getElementById('filter-to').value || null;
            resetAndLoadMeetings();
        }

        function clearFilter() {
            filterFrom = null;
            filterTo = null;
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value = '';
            resetAndLoadMeetings();
        }

        function resetAndLoadMeetings() {
            currentOffset = 0;
            hasMore = true;
            allLoadedMeetings = [];
            document.getElementById('sessions').innerHTML = '';
            document.getElementById('no-more').classList.add('hidden');
            loadMeetings(true);
        }

        // Load meetings with pagination
        function loadMeetings(loadSessions = false) {
            let url = '/api/meetings/?offset=' + currentOffset + '&limit=' + PAGE_SIZE;
            if (filterFrom) url += '&from=' + filterFrom;
            if (filterTo) url += '&to=' + filterTo;

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const box = document.getElementById('status-box');
                    const text = document.getElementById('status-text');
                    const detail = document.getElementById('status-detail');

                    const isActiveNow = !!data.active_meeting;

                    if (data.active_meeting) {
                        box.className = 'rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-green-500';
                        text.textContent = 'IN SESSION';
                        activeSessionStart = new Date(data.active_meeting.start).getTime();
                        updateCountUp();
                        if (!countUpInterval) {
                            countUpInterval = setInterval(updateCountUp, 1000);
                        }
                        if (lastPing && data.active_meeting.last_ping !== lastPing) {
                            triggerPulse();
                        }
                        lastPing = data.active_meeting.last_ping;
                    } else {
                        box.className = 'rounded-2xl p-8 mb-8 text-center transition-all duration-500 bg-red-500';
                        text.textContent = 'NOT IN SESSION';
                        detail.textContent = 'Waiting for activity...';
                        activeSessionStart = null;
                        if (countUpInterval) {
                            clearInterval(countUpInterval);
                            countUpInterval = null;
                        }
                    }

                    // Refresh sessions when session ends (was active, now not active)
                    if (wasActiveSession && !isActiveNow) {
                        resetAndLoadMeetings();
                    }
                    wasActiveSession = isActiveNow;

                    // Only update sessions if explicitly requested
                    if (loadSessions) {
                        hasMore = data.has_more;
                        document.getElementById('no-more').classList.toggle('hidden', hasMore || data.meetings.length === 0);

                        if (currentOffset === 0 && data.meetings.length === 0) {
                            document.getElementById('sessions').innerHTML = '<p class="opacity-40 text-sm py-4 text-center">No sessions recorded yet</p>';
                            return;
                        }

                        data.meetings.forEach(m => {
                            const existing = allLoadedMeetings.find(x => x.id === m.id);
                            if (existing) {
                                existing.tags = m.tags || [];
                            } else {
                                allLoadedMeetings.push({
                                    id: m.id,
                                    start: new Date(m.start),
                                    end: new Date(m.end),
                                    duration: m.duration_minutes,
                                    tags: m.tags || []
                                });
                            }
                        });

                        renderSessions();
                    }
                });
        }

        function renderSessions() {
            const sessionsEl = document.getElementById('sessions');
            sessionsEl.innerHTML = allLoadedMeetings.map(e => {
                const editBtn = isAdmin ? `<button onclick="event.stopPropagation(); openEditTimeModal(${e.id}, '${e.start.toISOString()}', '${e.end.toISOString()}')" class="edit-btn" style="position: absolute; top: 8px; right: 36px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 14px; background: none; border: none; cursor: pointer; opacity: 0.5;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">✎</button>` : '';
                const deleteBtn = isAdmin ? `<button onclick="event.stopPropagation(); deleteSession(${e.id})" class="delete-btn" style="position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: none; border: none; cursor: pointer;">&times;</button>` : '';
                const tagsHtml = e.tags && e.tags.length > 0 ? `<div class="flex flex-wrap gap-1 mt-2">${e.tags.map(t => `<span class="text-xs px-2 py-0.5 rounded-full text-white" style="background:${t.color}">${t.name}</span>`).join('')}</div>` : '';
                return `<div class="session-card rounded-xl p-4 transition-all cursor-pointer" style="position: relative;" onclick="window.location.href='/meetings/${e.id}/'" oncontextmenu="showTagMenu(event, ${e.id})">
                    ${editBtn}
                    ${deleteBtn}
                    <div class="flex justify-between items-center mb-2" style="padding-right: ${isAdmin ? '24px' : '0'};">
                        <span class="inline-flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>
                            <span class="font-medium text-green-600 session-text">Past Session</span>
                        </span>
                        <span class="text-sm font-medium opacity-60">${formatDuration(e.duration)}</span>
                    </div>
                    <div class="text-sm opacity-50 session-time">
                        ${formatDate(e.start.toISOString())} &bull; ${formatTime(e.start.toISOString())} – ${formatTime(e.end.toISOString())}
                    </div>
                    ${tagsHtml}
                </div>`;
            }).join('');
        }

        function loadMoreSessions() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            document.getElementById('load-more').classList.remove('hidden');
            currentOffset += PAGE_SIZE;
            loadMeetings(true);
            setTimeout(() => {
                isLoading = false;
                document.getElementById('load-more').classList.add('hidden');
            }, 500);
        }

        // Infinite scroll
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
                loadMoreSessions();
            }
        });

        function deleteSession(id) {
            fetch('/api/meetings/' + id + '/', { method: 'DELETE' })
                .then(() => {
                    // Remove from local array and re-render
                    allLoadedMeetings = allLoadedMeetings.filter(m => m.id !== id);
                    renderSessions();
                });
        }

        // Modal functions
        function openSession(id) {
            fetch('/api/meetings/' + id + '/')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('modal-meeting-id').value = id;
                    document.getElementById('modal-start').value = data.start.slice(0, 16);
                    document.getElementById('modal-end').value = data.end ? data.end.slice(0, 16) : '';
                    document.getElementById('modal-notes').value = data.notes || '';
                    document.getElementById('modal-notes').readOnly = !isAdmin;

                    // Show time display for non-admin
                    const startDate = new Date(data.start);
                    const endDate = data.end ? new Date(data.end) : null;
                    document.getElementById('modal-time-display').textContent =
                        formatDate(data.start) + ' • ' + formatTime(data.start) + (endDate ? ' – ' + formatTime(data.end) : '');

                    // Toggle admin/non-admin elements
                    document.getElementById('modal-times').classList.toggle('hidden', !isAdmin);
                    document.getElementById('modal-times-readonly').classList.toggle('hidden', isAdmin);
                    document.getElementById('modal-save-btn').classList.toggle('hidden', !isAdmin);
                    document.getElementById('photo-upload-btn').classList.toggle('hidden', !isAdmin);

                    renderPhotos(data.photos);
                    document.getElementById('modal').classList.remove('hidden');
                });
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function renderPhotos(photos) {
            const container = document.getElementById('modal-photos');
            if (photos.length === 0) {
                container.innerHTML = '<p class="col-span-3 text-sm opacity-40">No photos yet</p>';
            } else {
                container.innerHTML = photos.map(p => {
                    const deleteBtn = isAdmin ? `<button onclick="deletePhoto(${p.id})" class="absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs opacity-0 group-hover:opacity-100 transition-opacity">&times;</button>` : '';
                    return `<div class="relative group">
                        <img src="${p.url}" class="w-full h-20 object-cover rounded-lg cursor-pointer" onclick="window.open('${p.url}', '_blank')">
                        ${deleteBtn}
                    </div>`;
                }).join('');
            }
        }

        function uploadPhoto() {
            const input = document.getElementById('photo-input');
            const file = input.files[0];
            if (!file) return;
            const id = document.getElementById('modal-meeting-id').value;
            const formData = new FormData();
            formData.append('photo', file);
            fetch('/api/meetings/' + id + '/photos/', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(() => {
                    input.value = '';
                    openSession(id);
                });
        }

        function deletePhoto(photoId) {
            const id = document.getElementById('modal-meeting-id').value;
            fetch('/api/meetings/' + id + '/photos/' + photoId + '/', { method: 'DELETE' })
                .then(() => openSession(id));
        }

        function saveSession() {
            const id = document.getElementById('modal-meeting-id').value;
            const data = {
                start: document.getElementById('modal-start').value,
                end: document.getElementById('modal-end').value,
                notes: document.getElementById('modal-notes').value
            };
            fetch('/api/meetings/' + id + '/', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                closeModal();
                lastMeetingsHash = null;
                loadMeetings();
            });
        }

        document.getElementById('refreshButton').addEventListener('click', () => {
            const btn = document.getElementById('refreshButton');
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 500);
            loadMeetings();
        });

        loadMeetings(true);
        setInterval(() => loadMeetings(false), 500);

        // Tags context menu
        let allTags = [];
        let contextMeetingId = null;

        function loadTags() {
            fetch('/api/tags/')
                .then(r => r.json())
                .then(data => {
                    allTags = data.tags || [];
                    renderTagMenu();
                });
        }

        function renderTagMenu() {
            const itemsEl = document.getElementById('tag-menu-items');
            const emptyEl = document.getElementById('tag-menu-empty');

            if (allTags.length === 0) {
                itemsEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                itemsEl.innerHTML = allTags.map(t => `
                    <div class="context-menu-item px-4 py-2 cursor-pointer flex items-center gap-2" onclick="addTagToMeeting(${t.id})">
                        <span class="w-3 h-3 rounded-full" style="background:${t.color}"></span>
                        <span class="text-sm">${t.name}</span>
                    </div>
                `).join('');
            }
        }

        function showTagMenu(e, meetingId) {
            if (!isAdmin) return;
            e.preventDefault();
            contextMeetingId = meetingId;

            const menu = document.getElementById('tag-menu');
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            menu.classList.remove('hidden');
        }

        function hideTagMenu() {
            document.getElementById('tag-menu').classList.add('hidden');
            contextMeetingId = null;
        }

        function addTagToMeeting(tagId) {
            if (!contextMeetingId) return;
            const meetingId = contextMeetingId;
            fetch('/api/meetings/' + meetingId + '/tags/' + tagId + '/', { method: 'POST' })
                .then(() => {
                    hideTagMenu();
                    // Fetch updated meeting and refresh
                    fetch('/api/meetings/' + meetingId + '/')
                        .then(r => r.json())
                        .then(data => {
                            const meeting = allLoadedMeetings.find(m => m.id === meetingId);
                            if (meeting) {
                                meeting.tags = data.tags || [];
                                renderSessions();
                            }
                        });
                });
        }

        // Hide menu on click elsewhere
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#tag-menu')) {
                hideTagMenu();
            }
        });

        loadTags();

        // Tag management modal
        function openTagModal() {
            renderTagList();
            document.getElementById('tag-modal').classList.remove('hidden');
        }

        function closeTagModal() {
            document.getElementById('tag-modal').classList.add('hidden');
        }

        function renderTagList() {
            const listEl = document.getElementById('tag-list');
            if (allTags.length === 0) {
                listEl.innerHTML = '<p class="text-sm opacity-50">No tags yet</p>';
            } else {
                listEl.innerHTML = allTags.map(t => `
                    <div class="flex items-center gap-3 p-2 rounded-lg" style="background: rgba(255,255,255,0.05)">
                        <input type="color" value="${t.color}" onchange="updateTagColor(${t.id}, this.value)" class="w-8 h-8 rounded cursor-pointer">
                        <span class="flex-1 text-sm">${t.name}</span>
                        <button onclick="deleteTag(${t.id})" class="text-red-500 hover:text-red-400 text-sm">Delete</button>
                    </div>
                `).join('');
            }
        }

        function createNewTag() {
            const name = document.getElementById('new-tag-name').value.trim();
            const color = document.getElementById('new-tag-color').value;
            if (!name) return;

            fetch('/api/tags/manage/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color })
            })
            .then(r => r.json())
            .then(() => {
                document.getElementById('new-tag-name').value = '';
                loadTags();
                renderTagList();
            });
        }

        function updateTagColor(tagId, color) {
            fetch('/api/tags/' + tagId + '/', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ color })
            })
            .then(() => loadTags());
        }

        function deleteTag(tagId) {
            fetch('/api/tags/' + tagId + '/', { method: 'DELETE' })
            .then(() => {
                loadTags();
                renderTagList();
            });
        }

        // Edit time modal
        function openEditTimeModal(meetingId, startIso, endIso) {
            document.getElementById('edit-time-meeting-id').value = meetingId;
            document.getElementById('edit-time-start').value = startIso.slice(0, 16);
            document.getElementById('edit-time-end').value = endIso.slice(0, 16);
            document.getElementById('edit-time-modal').classList.remove('hidden');
        }

        function closeEditTimeModal() {
            document.getElementById('edit-time-modal').classList.add('hidden');
        }

        function saveEditTime() {
            const meetingId = document.getElementById('edit-time-meeting-id').value;
            const data = {
                start: document.getElementById('edit-time-start').value,
                end: document.getElementById('edit-time-end').value
            };
            fetch('/api/meetings/' + meetingId + '/', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                closeEditTimeModal();
                // Update local data and re-render
                const meeting = allLoadedMeetings.find(m => m.id == meetingId);
                if (meeting) {
                    meeting.start = new Date(data.start);
                    meeting.end = new Date(data.end);
                    meeting.duration = (meeting.end - meeting.start) / 60000;
                    renderSessions();
                }
            });
        }
    </script>
</body>
</html>
